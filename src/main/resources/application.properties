spring.application.name=bakery-api
server.port=${PORT:8080}

# Optional: reduce startup footprint in memory-constrained environments.
# Tradeoff: first request to a bean may be slower.
spring.main.lazy-initialization=${LAZY_INIT:false}

jwt.secret=${JWT_SECRET:dev-insecure-change-me}
jwt.expiration=86400000

# MySQL database settings
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bakery_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}

# JPA / Hibernate
#
# Local/dev default uses "update" so the app can bootstrap itself without manual SQL.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %logger{36} - %msg%n

# CORS (comma-separated). Override via env var or Railway Variables:
# app.cors.allowed-origins=https://tu-frontend.com,http://localhost:5173
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Pagination safety. Clamp requested `size` to avoid huge queries.
app.pagination.max-page-size=${PAGINATION_MAX_PAGE_SIZE:100}
