spring.application.name=bakery-api
server.port=${PORT:8080}

# Opcional: reduce la huella de inicio en entornos con restricciones de memoria.
# Compensación: la primera petición a un bean puede ser más lenta.
spring.main.lazy-initialization=${LAZY_INIT:false}

jwt.secret=${JWT_SECRET:dev-insecure-change-me}
# Expiración del token de acceso en milisegundos (por defecto 15 minutos).
jwt.expiration=${JWT_EXPIRATION_MS:900000}
# Expiración del token de refresco en milisegundos (por defecto 7 días).
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Configuración de la base de datos MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bakery_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}

# JPA / Hibernate
#
# El valor por defecto para local/desarrollo usa "update" para que la aplicación pueda iniciarse sin SQL manual.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

# Configuración de registros
logging.level.root=INFO
logging.level.com.bakery=DEBUG
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/bakery-api.log}
logging.file.max-size=10MB
logging.file.max-history=10

# Actuator (Comprobaciones de estado y métricas)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.enable.jvm=true
management.metrics.enable.process=true

# Limitación de tasa
rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:100}

# CORS (separado por comas). Sobrescribir mediante variable de entorno o variables de Railway:
# app.cors.allowed-origins=https://tu-frontend.com,http://localhost:5173
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://proyecto-intermodular-web-react-1.onrender.com}

# Seguridad de paginación. Limitar el tamaño (`size`) solicitado para evitar consultas masivas.
app.pagination.max-page-size=${PAGINATION_MAX_PAGE_SIZE:100}

# Swagger/OpenAPI: permite deshabilitarlo incluso en desarrollo.
springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:true}
