# Production defaults (override via environment variables in Railway).
server.port=${PORT}

# Optional: reduce startup footprint in memory-constrained environments.
# Tradeoff: first request to a bean may be slower.
spring.main.lazy-initialization=${LAZY_INIT:false}

# Avoid implicit schema changes in production.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false

# Require secrets/DB configuration via environment variables in production.
jwt.secret=${JWT_SECRET}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Keep DB pools small by default (each connection consumes memory on app and DB side).
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# In production, keep CORS closed unless explicitly configured.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Shorter access tokens in production (override as needed).
jwt.expiration=${JWT_EXPIRATION_MS:900000}

# Pagination safety. Clamp requested `size` to avoid huge queries.
app.pagination.max-page-size=${PAGINATION_MAX_PAGE_SIZE:100}

# Swagger/OpenAPI: optional in production.
springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:true}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %logger{36} - %msg%n
